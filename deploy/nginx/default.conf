limit_req_zone $binary_remote_addr zone=telegram_per_ip:10m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server {
    listen 80;
    server_name _;
    server_tokens off;

    client_max_body_size 20m;
    limit_req_status 429;

    location /telegram/webhook {
        if ($request_method !~ ^(POST)$) {
            return 405;
        }

        limit_req zone=telegram_per_ip burst=20 nodelay;
        limit_conn conn_per_ip 30;
        proxy_pass http://bot:8080/telegram/webhook;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        add_header Content-Type text/plain;
        return 200 "scan2docx nginx is running\n";
    }
}
